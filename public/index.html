<!DOCTYPE html>
<html>
<head>
    <title>Hospital Patient Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container"> 
    

    <h1>Healing Touch Hospital Form</h1>

    <form action="/add-patient" method="POST">

        <label>Patient Name:</label>
        <input type="text" name="name" required>

        <br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob" required>

        <br><br>

        <label>Disease / Illness:</label>
        <input type="text" name="disease" required>

        <br><br>

        <label>Date of Admit:</label>
        <input type="date" name="doA" required>

        <br><br>

        <button type="submit">
            Admit Patient
        </button>

    </form>

    <br>

    <a href="/patients">
        View Patient Details
    </a>
</div>
</body>
</html>
